<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ali Hope Foundation Distribution</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    /* â”€â”€ Login â”€â”€ */
    #login-view {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 14px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
    }

    .card h1 {
      font-size: 1.8rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #F1AE44;
      margin-bottom: 1.8rem;
      text-align: center;
    }

    label {
      display: block;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
      margin-bottom: 0.35rem;
    }

    input[type="text"],
    input[type="password"],
    input[type="number"],
    textarea {
      width: 100%;
      padding: 0.6rem 0.9rem;
      background: #1a1a2e;
      border: 2px solid #0f3460;
      border-radius: 8px;
      color: #eee;
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 1.1rem;
    }

    input:focus, textarea:focus { border-color: #F1AE44; }

    textarea { resize: vertical; min-height: 80px; }

    .error-msg {
      color: #F1AE44;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      min-height: 1.2rem;
    }

    .btn {
      padding: 0.7rem 1.6rem;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      background: #F1AE44;
      color: #fff;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s, transform 0.1s;
    }

    .btn:hover { background: #d4921a; transform: scale(1.04); }

    .btn.secondary {
      background: #0f3460;
    }
    .btn.secondary:hover { background: #163a6e; }

    .btn-full { width: 100%; }

    /* â”€â”€ App view â”€â”€ */
    #app-view { display: none; }

    header {
      background: #16213e;
      border-bottom: 2px solid #0f3460;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-size: 1.5rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #F1AE44;
    }

    main {
      max-width: 860px;
      margin: 2rem auto;
      padding: 0 1rem;
    }

    .form-card {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 14px;
      padding: 2rem;
      margin-bottom: 2rem;
    }

    .form-card h2 {
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #a8dadc;
      margin-bottom: 1.4rem;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1rem;
    }

    .form-group { display: flex; flex-direction: column; }

    .submit-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 0.5rem;
    }

    /* â”€â”€ Table â”€â”€ */
    .table-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .table-header h2 {
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #a8dadc;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.92rem;
    }

    th {
      background: #0f3460;
      color: #a8dadc;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 0.75rem;
      padding: 0.7rem 1rem;
      text-align: left;
    }

    td {
      padding: 0.7rem 1rem;
      border-bottom: 1px solid #0f3460;
      color: #ddd;
    }

    tr:last-child td { border-bottom: none; }

    tr:hover td { background: #16213e; }

    .empty-row td {
      text-align: center;
      color: #555;
      padding: 2rem;
    }

    /* â”€â”€ Import â”€â”€ */
    .import-zone {
      border: 2px dashed #0f3460;
      border-radius: 10px;
      padding: 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s;
      margin-bottom: 1rem;
    }
    .import-zone:hover { border-color: #F1AE44; }
    .import-zone p { color: #888; font-size: 0.9rem; margin-top: 0.4rem; }
    .import-zone input[type="file"] { display: none; }
    .import-preview {
      font-size: 0.9rem;
      color: #a8dadc;
      margin-bottom: 0.8rem;
      min-height: 1.2rem;
    }
    .import-row { display: flex; gap: 1rem; align-items: center; }
    .tag {
      display: inline-block;
      background: #0f3460;
      color: #a8dadc;
      border-radius: 5px;
      padding: 0.15rem 0.5rem;
      font-size: 0.75rem;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    @media (max-width: 560px) {
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>

      <!-- Submission form -->
      <div class="form-card">
        <h2>New Distribution Record</h2>
        <div class="form-row">
          <div class="form-group">
            <label for="custname">Customer Name</label>
            <input type="text" id="custname" placeholder="Full name" />
          </div>
          <div class="form-group">
            <label for="telephone">Telephone</label>
            <input type="text" id="telephone" placeholder="Phone number" />
          </div>
          <div class="form-group">
            <label for="address">Delivery Address</label>
            <input type="text" id="address" placeholder="Enter delivery address..." />
          </div>
        </div>

          <div class="form-group">
            <label for="diapers">Diaper QTY</label>
            <input type="number" id="diapers" min="0" placeholder="0" />

            <label for="diaper-size">Diaper Size</label>
            <input type="text" id="diaper-size" placeholder="e.g. NB, 1, 2, XL" />
          </div>
          <div class="form-group">
            <label for="wipes">Wipes</label>
            <input type="number" id="wipes" min="0" placeholder="0" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="nutrition">Nutrition</label>
            <input type="number" id="nutrition" min="0" placeholder="0" />
          </div>
        </div>
        <div class="submit-row">
          <button class="btn" id="submit-btn">Submit Record</button>
        </div>
      </div>

      <!-- Import from Excel -->
      <div class="form-card">
        <h2>Import from Excel</h2>
        <label class="import-zone" for="excel-file-input">
          <span style="font-size:1.8rem;">ðŸ“‚</span>
          <p>Click to select an <strong>.xlsx</strong> or <strong>.csv</strong> file</p>
          <p>Expected columns: <span class="tag">Name</span> <span class="tag">Telephone</span> <span class="tag">Address</span> <span class="tag">Diaper QTY</span> <span class="tag">Diaper Size</span> <span class="tag">Wipes</span> <span class="tag">Nutrition</span></p>
          <input type="file" id="excel-file-input" accept=".xlsx,.xls,.csv" />
        </label>
        <div class="import-preview" id="import-preview"></div>
        <div class="import-row">
          <button class="btn" id="import-btn" disabled>Import Records</button>
          <span id="import-status" style="font-size:0.85rem; color:#a8dadc;"></span>
        </div>
      </div>

      <!-- History -->
      <div class="form-card">
        <div class="table-header">
          <h2>Submission History</h2>
          <button class="btn secondary" id="clear-btn">Clear History</button>
        </div>
        <div class="table-wrap">
          <table id="history-table">
            <thead>
              <tr>
                <th>Date / Time</th>
                <th>Name</th>
                <th>Telephone</th>
                <th>Address</th>
                <th>Diaper QTY</th>
                <th>Diaper Size</th>
                <th>Wipes</th>
                <th>Nutrition</th>
              </tr>
            </thead>
            <tbody id="history-body"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script>
    const CREDENTIALS = { username: 'admin', password: '1234' };
    const STORAGE_KEY = 'distro-log';

    // â”€â”€ Auth â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    function isLoggedIn() {
      return sessionStorage.getItem('loggedIn') === 'true';
    }

    function showApp() {
      document.getElementById('login-view').style.display = 'none';
      document.getElementById('app-view').style.display = 'block';
      renderTable();
    }

    function showLogin() {
      document.getElementById('login-view').style.display = '';
      document.getElementById('app-view').style.display = 'none';
      document.getElementById('login-error').textContent = '';
      document.getElementById('username').value = '';
      document.getElementById('password').value = '';
    }

    document.getElementById('login-btn').addEventListener('click', () => {
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value;
      if (user === CREDENTIALS.username && pass === CREDENTIALS.password) {
        sessionStorage.setItem('loggedIn', 'true');
        showApp();
      } else {
        document.getElementById('login-error').textContent = 'Invalid username or password.';
      }
    });

    // Allow pressing Enter to log in
    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('login-btn').click();
    });

    document.getElementById('logout-btn').addEventListener('click', () => {
      sessionStorage.removeItem('loggedIn');
      showLogin();
    });

    // â”€â”€ Data â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    function loadRecords() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch {
        return [];
      }
    }

    function saveRecords(records) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
    }

    // â”€â”€ Form â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    document.getElementById('submit-btn').addEventListener('click', () => {
      const name       = document.getElementById('custname').value.trim();
      const telephone  = document.getElementById('telephone').value.trim();
      const diapers    = document.getElementById('diapers').value.trim();
      const diaperSize = document.getElementById('diaper-size').value.trim();
      const wipes      = document.getElementById('wipes').value.trim();
      const nutrition  = document.getElementById('nutrition').value.trim();
      const address    = document.getElementById('address').value.trim();

      if (!address) {
        alert('Please enter a delivery address.');
        return;
      }

      const record = {
        datetime:   new Date().toLocaleString(),
        name,
        telephone,
        address,
        diapers:    diapers === '' ? 0 : Number(diapers),
        diaperSize,
        wipes:      wipes     === '' ? 0 : Number(wipes),
        nutrition:  nutrition === '' ? 0 : Number(nutrition),
      };

      const records = loadRecords();
      records.unshift(record);
      saveRecords(records);

      // Reset form
      document.getElementById('custname').value   = '';
      document.getElementById('telephone').value  = '';
      document.getElementById('diapers').value    = '';
      document.getElementById('diaper-size').value = '';
      document.getElementById('wipes').value      = '';
      document.getElementById('nutrition').value  = '';
      document.getElementById('address').value    = '';

      renderTable();
    });

    // â”€â”€ Excel Import â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    let pendingImport = [];

    document.getElementById('excel-file-input').addEventListener('change', function () {
      const file = this.files[0];
      if (!file) return;

      const preview  = document.getElementById('import-preview');
      const importBtn = document.getElementById('import-btn');
      pendingImport  = [];
      importBtn.disabled = true;
      preview.textContent = 'Parsingâ€¦';

      const reader = new FileReader();
      reader.onload = function (e) {
        try {
          const data = new Uint8Array(e.target.result);
          const workbook = XLSX.read(data, { type: 'array' });
          const sheet = workbook.Sheets[workbook.SheetNames[0]];
          const rows  = XLSX.utils.sheet_to_json(sheet, { defval: '' });

          // Normalise header names (case-insensitive, trim spaces)
          pendingImport = rows.map(row => {
            const get = (...keys) => {
              for (const k of keys) {
                const found = Object.keys(row).find(h => h.trim().toLowerCase() === k);
                if (found !== undefined) return String(row[found]).trim();
              }
              return '';
            };
            return {
              datetime:   new Date().toLocaleString(),
              name:       get('name', 'customer', 'customer name', 'full name'),
              telephone:  get('telephone', 'phone', 'tel', 'phone number'),
              address:    get('address', 'delivery address'),
              diapers:    Number(get('diaper qty', 'diaper quantity', 'diapers', 'diaper')) || 0,
              diaperSize: get('diaper size', 'diapersize', 'diaper_size', 'size'),
              wipes:      Number(get('wipes', 'wipe')) || 0,
              nutrition:  Number(get('nutrition')) || 0,
            };
          }).filter(r => r.address || r.name);

          if (pendingImport.length === 0) {
            preview.textContent = 'No valid rows found. Make sure columns are named: Name, Telephone, Address, Diapers, Diaper Size, Wipes, Nutrition.';
          } else {
            preview.textContent = `Found ${pendingImport.length} record(s) ready to import.`;
            importBtn.disabled = false;
          }
        } catch (err) {
          preview.textContent = 'Error reading file: ' + err.message;
        }
      };
      reader.readAsArrayBuffer(file);
    });

    document.getElementById('import-btn').addEventListener('click', () => {
      if (!pendingImport.length) return;
      const records = loadRecords();
      // newest first â€” reverse so latest row in sheet ends up at top
      pendingImport.slice().reverse().forEach(r => records.unshift(r));
      saveRecords(records);
      pendingImport = [];
      document.getElementById('import-btn').disabled = true;
      document.getElementById('import-preview').textContent = '';
      document.getElementById('import-status').textContent  = 'Import successful!';
      document.getElementById('excel-file-input').value = '';
      setTimeout(() => { document.getElementById('import-status').textContent = ''; }, 3000);
      renderTable();
    });

    // â”€â”€ Table â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    function renderTable() {
      const tbody = document.getElementById('history-body');
      const records = loadRecords();
      tbody.innerHTML = '';

      if (records.length === 0) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="8">No records yet.</td></tr>';
        return;
      }

      records.forEach(r => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${escapeHtml(r.datetime)}</td>
          <td>${escapeHtml(r.name || 'â€”')}</td>
          <td>${escapeHtml(r.telephone || 'â€”')}</td>
          <td>${escapeHtml(r.address)}</td>
          <td>${escapeHtml(String(r.diapers ?? 'â€”'))}</td>
          <td>${escapeHtml(r.diaperSize || 'â€”')}</td>
          <td>${r.wipes}</td>
          <td>${r.nutrition}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    document.getElementById('clear-btn').addEventListener('click', () => {
      if (confirm('Clear all history? This cannot be undone.')) {
        saveRecords([]);
        renderTable();
      }
    });

    // â”€â”€ Init â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    if (isLoggedIn()) {
      showApp();
    }
  </script>
</body>
</html>
