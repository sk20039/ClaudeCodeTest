<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.8rem;
      color: #a8dadc;
      font-weight: 500;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.04);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      border-color: #e94560;
      animation: pulse 0.5s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    #scores {
      display: flex;
      gap: 2rem;
      margin: 1.5rem 0 1rem;
      font-size: 1rem;
    }

    .score-box {
      text-align: center;
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 10px;
      padding: 0.5rem 1.2rem;
    }

    .score-box .label { color: #888; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
    .score-box .val   { font-size: 1.6rem; font-weight: bold; }
    .score-box.x-box .val { color: #e94560; }
    .score-box.o-box .val { color: #a8dadc; }
    .score-box.tie-box .val { color: #f4d03f; }

    #restart {
      margin-top: 1.5rem;
      padding: 0.7rem 2rem;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      background: #e94560;
      color: #fff;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s, transform 0.1s;
    }

    #restart:hover { background: #c73652; transform: scale(1.05); }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>
  <div id="status">Player X's turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <div id="scores">
    <div class="score-box x-box">
      <div class="label">X Wins</div>
      <div class="val" id="x-score">0</div>
    </div>
    <div class="score-box tie-box">
      <div class="label">Ties</div>
      <div class="val" id="tie-score">0</div>
    </div>
    <div class="score-box o-box">
      <div class="label">O Wins</div>
      <div class="val" id="o-score">0</div>
    </div>
  </div>

  <button id="restart">New Game</button>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, gameOver, scores;

    function init() {
      board    = Array(9).fill(null);
      current  = 'X';
      gameOver = false;

      document.querySelectorAll('.cell').forEach(c => {
        c.textContent = '';
        c.className = 'cell';
      });
      setStatus(`Player ${current}'s turn`);
    }

    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }

    function updateScores() {
      document.getElementById('x-score').textContent = scores.X;
      document.getElementById('o-score').textContent = scores.O;
      document.getElementById('tie-score').textContent = scores.T;
    }

    function checkWin() {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return [a, b, c];
        }
      }
      return null;
    }

    document.querySelectorAll('.cell').forEach(cell => {
      cell.addEventListener('click', () => {
        const i = +cell.dataset.i;
        if (gameOver || board[i]) return;

        board[i] = current;
        cell.textContent = current;
        cell.classList.add(current.toLowerCase(), 'taken');

        const win = checkWin();
        if (win) {
          win.forEach(idx => document.querySelector(`[data-i="${idx}"]`).classList.add('win'));
          setStatus(`Player ${current} wins!`);
          scores[current]++;
          updateScores();
          gameOver = true;
        } else if (board.every(Boolean)) {
          setStatus("It's a tie!");
          scores.T++;
          updateScores();
          gameOver = true;
        } else {
          current = current === 'X' ? 'O' : 'X';
          setStatus(`Player ${current}'s turn`);
        }
      });
    });

    document.getElementById('restart').addEventListener('click', init);

    scores = { X: 0, O: 0, T: 0 };
    init();
  </script>
</body>
</html>
